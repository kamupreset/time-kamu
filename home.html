<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIME KAMU</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f6f6f6;
padding-bottom:100px;
}

.container{
padding:20px;
max-width:450px;
margin:auto;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:20px;
}

.location{
font-size:13px;
background:white;
padding:8px 14px;
border-radius:20px;
font-weight:bold;
box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.icons{
display:flex;
gap:10px;
}

.icon{
width:45px;
height:45px;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.title{
margin-top:25px;
font-size:34px;
font-weight:bold;
line-height:40px;
}

.search{
margin-top:20px;
background:white;
border-radius:20px;
padding:15px;
display:flex;
align-items:center;
gap:10px;
box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.search input{
border:none;
outline:none;
width:100%;
font-size:15px;
background:transparent;
}

.categories{
display:flex;
gap:10px;
overflow:auto;
margin-top:20px;
padding-bottom:5px;
}

.categories::-webkit-scrollbar{
display:none;
}

.cat{
background:white;
padding:10px 18px;
border-radius:20px;
white-space:nowrap;
font-size:14px;
box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.active{
background:black;
color:white;
}

.section{
margin-top:25px;
font-size:20px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:15px;
}

.card{
position:relative;
border-radius:20px;
overflow:hidden;
aspect-ratio:1/1;
background:#ddd;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-3px);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.badge{
position:absolute;
top:10px;
left:10px;
background:#2196f3;
color:white;
padding:4px 8px;
border-radius:10px;
font-size:12px;
}

.name{
position:absolute;
bottom:12px;
left:12px;
right:12px;
color:white;
font-size:15px;
font-weight:bold;
text-shadow:0 2px 8px rgba(0,0,0,.7);
}

.bottom{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
width:92%;
max-width:430px;
background:white;
border-radius:25px;
display:flex;
justify-content:space-around;
padding:15px 10px;
box-shadow:0 5px 25px rgba(0,0,0,.12);
z-index:999;
}

.nav{
text-align:center;
font-size:13px;
cursor:pointer;
}

.music{
position:fixed;
right:20px;
bottom:95px;
width:55px;
height:55px;
border-radius:50%;
background:black;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,.2);
z-index:999;
transition:.3s;
}

.music:active{
transform:scale(.92);
}
</style>
</head>

<body>

<div class="container">

<div class="top">

<div class="location">
📍 TIME KAMU
</div>

<div class="icons">
<div class="icon">🔔</div>
<div class="icon">👑</div>
</div>

</div>

<div class="title">
Discover<br>
Premium Presets
</div>

<div class="search">
🔍
<input placeholder="Search Preset">
⚙️
</div>

<div class="categories">
<div class="cat active">Trending</div>
<div class="cat">Photo</div>
<div class="cat">Video</div>
<div class="cat">Premium</div>
<div class="cat">VIP</div>
</div>

<div class="section">
Popular Presets
</div>

<div class="grid">

<div class="card" onclick="location.href='preset.html'">
<img src="https://picsum.photos/500?1">
<div class="badge">VIP</div>
<div class="name">Cinematic Preset</div>
</div>

<div class="card" onclick="location.href='preset.html'">
<img src="https://picsum.photos/500?2">
<div class="badge">VIP</div>
<div class="name">Dark Tone Preset</div>
</div>

<div class="card" onclick="location.href='preset.html'">
<img src="https://picsum.photos/500?3">
<div class="badge">VIP</div>
<div class="name">Photo Master</div>
</div>

<div class="card" onclick="location.href='preset.html'">
<img src="https://picsum.photos/500?4">
<div class="badge">VIP</div>
<div class="name">Reel Editing Pack</div>
</div>

</div>

</div>

<div class="music">🎵</div>

<div class="bottom">

<div class="nav" onclick="location.href='home.html'">
🏠<br>Home
</div>

<div class="nav" onclick="location.href='preset.html'">
🎬<br>Preset
</div>

<div class="nav" onclick="location.href='orders.html'">
📦<br>Orders
</div>

<div class="nav" onclick="location.href='profile.html'">
👤<br>Profile
</div>

</div>

<audio id="bgMusic" loop>
<source src="song1.mp3" type="audio/mpeg">
</audio>

<script>
const musicBtn = document.querySelector(".music");
const music = document.getElementById("bgMusic");

musicBtn.onclick = function(){
if(music.paused){
music.play();
musicBtn.innerHTML="🔊";
}else{
music.pause();
musicBtn.innerHTML="🎵";
}
};
</script>

</body>
</html>
