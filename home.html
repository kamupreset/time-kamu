<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TIME KAMU Home</title><style>
body{
margin:0;
background:#f5f5f5;
font-family:Arial,sans-serif;
}

.container{
padding:20px;
max-width:420px;
margin:auto;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:20px;
}

.profile{
width:45px;
height:45px;
background:#fff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

.search{
width:100%;
padding:15px;
border:none;
border-radius:20px;
margin-top:20px;
background:#fff;
}

.categories{
display:flex;
gap:10px;
overflow:auto;
margin-top:20px;
}

.cat{
background:#fff;
padding:10px 18px;
border-radius:20px;
white-space:nowrap;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.card{
background:#fff;
border-radius:20px;
overflow:hidden;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card h3{
font-size:15px;
padding:10px;
}

.bottom{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:400px;
background:#fff;
border-radius:25px;
display:flex;
justify-content:space-around;
padding:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}
</style></head><body><div class="container"><div class="top">
<div>
<h2>Welcome 👋</h2>
<p>TIME KAMU</p>
</div><div class="profile">👑</div>
</div><input class="search" placeholder="Search Presets"><div class="categories">
<div class="cat">Trending</div>
<div class="cat">Photo</div>
<div class="cat">Video</div>
<div class="cat">Premium</div>
</div><div class="grid"><div class="card">
<img src="https://picsum.photos/300/200?1">
<h3>Premium Preset</h3>
</div><div class="card">
<img src="https://picsum.photos/300/200?2">
<h3>Photo Preset</h3>
</div><div class="card">
<img src="https://picsum.photos/300/200?3">
<h3>Video Preset</h3>
</div><div class="card">
<img src="https://picsum.photos/300/200?4">
<h3>Trending Preset</h3>
</div></div></div><div class="bottom">
🏠 Home
🎬 Presets
📂 My Files
👤 Profile
</div></body>
</html>
