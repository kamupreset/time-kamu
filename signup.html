<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIME KAMU - Sign Up</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f7f7f7;
min-height:100vh;
}

.banner{
width:100%;
height:320px;
overflow:hidden;
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
}

.card{
width:90%;
max-width:420px;
margin:-60px auto 30px;
background:white;
border-radius:40px;
padding:35px 25px;
box-shadow:0 15px 40px rgba(0,0,0,.12);
position:relative;
}

.logo{
font-size:60px;
text-align:center;
margin-bottom:10px;
}

.title{
font-size:42px;
font-weight:bold;
text-align:center;
margin-bottom:8px;
}

.subtitle{
text-align:center;
color:#777;
margin-bottom:30px;
font-size:18px;
}

.input{
width:100%;
padding:18px;
border:2px solid #eee;
border-radius:20px;
font-size:18px;
margin-bottom:15px;
outline:none;
}

.btn{
width:100%;
padding:18px;
border:none;
background:black;
color:white;
font-size:20px;
font-weight:bold;
border-radius:20px;
margin-top:10px;
cursor:pointer;
}

.login-link{
text-align:center;
margin-top:25px;
font-size:18px;
}

.login-link a{
color:black;
font-weight:bold;
text-decoration:none;
}
</style>

</head>

<body>

<div class="banner">
<img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=1200">
</div>

<div class="card">

<div class="logo">👑</div>

<div class="title">TIME KAMU</div>

<div class="subtitle">
Create Your Premium Account
</div>

<input type="text" class="input" placeholder="Full Name">

<input type="text" class="input" placeholder="Username">

<input type="text" class="input" placeholder="WhatsApp Number">

<input type="password" class="input" placeholder="Password">

<input type="password" class="input" placeholder="Confirm Password">

<button class="btn">
CREATE ACCOUNT
</button>

<div class="login-link">
Already have an account?
<a href="login.html">Login</a>
</div>

</div>

</body>
</html>
