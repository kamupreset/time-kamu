<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIME KAMU - Sign Up</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f6f6f6;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:white;
border-radius:35px;
padding:35px 25px;
box-shadow:0 10px 35px rgba(0,0,0,.08);
}

.logo{
text-align:center;
font-size:60px;
margin-bottom:10px;
}

.title{
font-size:38px;
font-weight:bold;
text-align:center;
margin-bottom:8px;
}

.subtitle{
text-align:center;
color:#777;
margin-bottom:30px;
}

.input{
width:100%;
padding:16px;
border:2px solid #eee;
border-radius:18px;
font-size:16px;
margin-bottom:15px;
outline:none;
}

.input:focus{
border-color:#000;
}

.btn{
width:100%;
padding:17px;
border:none;
border-radius:20px;
background:#111;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.login-link{
text-align:center;
margin-top:20px;
}

.login-link a{
text-decoration:none;
color:#111;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">👑</div>

<div class="title">TIME KAMU</div>

<div class="subtitle">
Create Your Premium Account
</div>

<input type="text" class="input" placeholder="Full Name">

<input type="text" class="input" placeholder="Username">

<input type="text" class="input" placeholder="WhatsApp Number">

<input type="password" class="input" placeholder="Password">

<input type="password" class="input" placeholder="Confirm Password">

<button class="btn">
CREATE ACCOUNT
</button>

<div class="login-link">
Already have an account?
<a href="login.html">Login</a>
</div>

</div>

</body>
</html>
