<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - TIME KAMU</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f6f6f7;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.profile-card{
background:white;
border-radius:35px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
text-align:center;
}

.avatar{
width:110px;
height:110px;
background:#111;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
margin:auto;
}

.name{
font-size:32px;
font-weight:800;
margin-top:18px;
color:#111;
}

.badge{
display:inline-block;
margin-top:10px;
background:#111;
color:white;
padding:10px 20px;
border-radius:30px;
font-size:14px;
font-weight:600;
}

.number{
margin-top:12px;
font-size:16px;
color:#777;
}

.stats{
display:flex;
gap:12px;
margin-top:25px;
}

.stat{
flex:1;
background:#fafafa;
border-radius:22px;
padding:18px;
}

.stat h2{
font-size:26px;
font-weight:800;
}

.stat p{
color:#777;
font-size:14px;
margin-top:4px;
}

.section{
margin-top:20px;
}

.menu{
background:white;
border-radius:25px;
padding:22px;
box-shadow:0 8px 25px rgba(0,0,0,.04);
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 0;
border-bottom:1px solid #eee;
font-size:18px;
font-weight:600;
}

.item:last-child{
border:none;
}

.logout{
width:100%;
height:62px;
border:none;
background:#111;
color:white;
border-radius:22px;
font-size:20px;
font-weight:700;
margin-top:25px;
}

.footer{
text-align:center;
margin-top:20px;
color:#999;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="profile-card">

<div class="avatar">👑</div>

<div class="name" id="userName">Loading...</div>

<div class="badge">VIP MEMBER</div>

<div class="number" id="userEmail">
Loading...
</div>

<div class="stats">

<div class="stat">
<h2>12</h2>
<p>Orders</p>
</div>

<div class="stat">
<h2>8</h2>
<p>Presets</p>
</div>

</div>

</div>

<div class="section">

<div class="menu">

<div class="item" onclick="location.href='orders.html'">
<span>📦 My Orders</span>
<span>›</span>
</div>

<div class="item" onclick="location.href='purchased.html'">
<span>⭐ Purchased Presets</span>
<span>›</span>
</div>

<div class="item" onclick="location.href='support.html'">
<span>💬 WhatsApp Support</span>
<span>›</span>
</div>

<div class="item" onclick="window.open('https://t.me/YOUR_TELEGRAM_LINK')">
<span>📢 Telegram VIP</span>
<span>›</span>
</div>

<div class="item" onclick="location.href='settings.html'">
<span>⚙️ Settings</span>
<span>›</span>
</div>

</div>

<button class="logout">
Logout
</button>

</div>

<div class="footer">
TIME KAMU Premium Account
</div>

</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDbrMx6RdN_VnSxt1VspKn8yA5HvNeHMQE",
  authDomain: "kamupreset1.firebaseapp.com",
  projectId: "kamupreset1",
  storageBucket: "kamupreset1.firebasestorage.app",
  messagingSenderId: "79907609973",
  appId: "1:79907609973:web:a65ab09ce59b99d37f873c",
  measurementId: "G-34SBTMX2FX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if(user){
    document.getElementById("userName").innerText = user.email.split("@")[0];
    document.getElementById("userEmail").innerText = user.email;
  } else {
    window.location.href = "login.html";
  }
});

document.querySelector(".logout").addEventListener("click", () => {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
});
</script>
</body>
</html>
