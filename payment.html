<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIME KAMU Payment</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f6f6f7;
padding:20px;
color:#111;
}

.back{
font-size:32px;
text-decoration:none;
color:#111;
}

.container{
margin-top:15px;
background:white;
border-radius:35px;
padding:25px;
box-shadow:0 15px 50px rgba(0,0,0,0.05);
}

.logo{
width:90px;
height:90px;
background:#111;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:45px;
margin:auto;
}

.title{
text-align:center;
margin-top:15px;
}

.title h1{
font-size:52px;
font-weight:800;
}

.title p{
color:#888;
font-size:20px;
margin-top:5px;
}

.product{
margin-top:30px;
background:#fafafa;
border-radius:25px;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.product h2{
font-size:24px;
}

.product p{
color:#777;
margin-top:5px;
}

.price{
font-size:38px;
font-weight:800;
}

.section-title{
margin-top:30px;
margin-bottom:15px;
font-size:20px;
font-weight:700;
}

.methods{
display:flex;
gap:10px;
overflow:auto;
}

.method{
padding:12px 18px;
background:white;
border-radius:15px;
border:1px solid #eee;
font-weight:600;
white-space:nowrap;
}

.qr-card{
margin-top:20px;
background:white;
border-radius:30px;
padding:25px;
text-align:center;
border:2px dashed #ddd;
}

.qr-box{
height:260px;
background:#f5f5f5;
border-radius:25px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:#999;
font-weight:600;
}

.upi-card{
margin-top:20px;
background:#fafafa;
padding:18px;
border-radius:20px;
text-align:center;
}

.upi-card p{
color:#888;
font-size:14px;
margin-bottom:10px;
}

.upi-id{
font-size:22px;
font-weight:700;
}

.copy-btn{
margin-top:15px;
width:100%;
height:55px;
border:none;
background:white;
border-radius:18px;
font-size:17px;
font-weight:700;
cursor:pointer;
}

.input{
margin-top:20px;
width:100%;
height:60px;
border:none;
background:#fafafa;
border-radius:18px;
padding:0 20px;
font-size:17px;
outline:none;
}

.support{
display:block;
margin-top:20px;
text-align:center;
text-decoration:none;
color:#25D366;
font-size:20px;
font-weight:700;
}

.verify-btn{
margin-top:25px;
width:100%;
height:65px;
border:none;
background:#111;
color:white;
font-size:20px;
font-weight:800;
border-radius:22px;
cursor:pointer;
}

.footer{
text-align:center;
margin-top:20px;
color:#999;
font-size:14px;
}
</style>
</head>

<body>

<a href="preset.html" class="back">←</a>

<div class="container">

<div class="logo">👑</div>

<div class="title">
<h1>Payment</h1>
<p>Complete your purchase</p>
</div>

<div class="product">
<div>
<h2>Cinematic Preset</h2>
<p>VIP Access</p>
</div>
<div class="price">₹49</div>
</div>

<h3 class="section-title">Payment Methods</h3>

<div class="methods">
<div class="method">📱 PhonePe</div>
<div class="method">🟢 GPay</div>
<div class="method">🔵 Paytm</div>
<div class="method">💳 UPI</div>
</div>

<div class="qr-card">
<div class="qr-box">
QR CODE
</div>
</div>

<div class="upi-card">
<p>UPI ID</p>
<div class="upi-id">6294778013-2@ybl</div>

<button class="copy-btn"
onclick="copyUPI()">
Copy UPI ID
</button>
</div>

<input
class="input"
placeholder="Enter Transaction ID">

<button class="verify-btn">
VERIFY PAYMENT
</button>

<a
class="support"
href="https://wa.me/916294778013">
WhatsApp Support
</a>

<div class="footer">
Secure Payment • TIME KAMU
</div>

</div>

<script>
function copyUPI(){
navigator.clipboard.writeText(
"6294778013-2@ybl"
);
alert("UPI ID Copied!");
}
</script>

</body>
</html>
