<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TIME KAMU Payment</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f6f6f7;
padding:20px;
color:#111;
}

.container{
max-width:420px;
margin:auto;
}

.back-btn{
text-decoration:none;
font-size:34px;
color:#111;
display:inline-block;
margin-bottom:15px;
}

.header{
text-align:center;
margin-bottom:25px;
}

.logo{
width:72px;
height:72px;
background:#111;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
margin:auto;
}

.header h1{
font-size:34px;
font-weight:800;
margin-top:15px;
}

.header p{
color:#888;
margin-top:6px;
font-size:15px;
}

.product-card{
background:white;
border-radius:28px;
padding:16px;
display:flex;
align-items:center;
gap:15px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.thumb{
width:85px;
height:85px;
border-radius:20px;
object-fit:cover;
}

.product-info{
flex:1;
}

.vip{
display:inline-block;
background:#111;
color:white;
padding:4px 10px;
border-radius:20px;
font-size:12px;
margin-bottom:8px;
}

.product-info h2{
font-size:18px;
font-weight:700;
}

.product-info p{
font-size:13px;
color:#888;
margin-top:3px;
}

.price{
font-size:30px;
font-weight:800;
}

.section-title{
font-size:18px;
font-weight:700;
margin:25px 0 12px;
}

.qr-card{
background:white;
padding:20px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
text-align:center;
}

.qr{
width:220px;
height:220px;
border-radius:20px;
object-fit:cover;
}

.upi-card{
margin-top:20px;
}

.upi-label{
font-size:14px;
font-weight:700;
margin-bottom:8px;
}

.upi-box{
background:white;
border-radius:20px;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.upi-id{
font-size:15px;
font-weight:700;
}

.copy-btn{
background:#111;
color:white;
border:none;
padding:10px 14px;
border-radius:12px;
font-weight:600;
cursor:pointer;
}

.txn-input{
width:100%;
height:58px;
margin-top:20px;
border:none;
background:white;
border-radius:20px;
padding:0 18px;
font-size:16px;
outline:none;
box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.verify-btn{
width:100%;
height:58px;
margin-top:20px;
border:none;
background:#111;
color:white;
font-size:18px;
font-weight:700;
border-radius:20px;
cursor:pointer;
}

.support-btn{
display:block;
text-align:center;
margin-top:18px;
text-decoration:none;
font-weight:700;
color:#25D366;
font-size:18px;
}

.footer{
text-align:center;
margin-top:18px;
font-size:13px;
color:#999;
}

</style>
</head>

<body>

<div class="container">

<a href="preset.html" class="back-btn">←</a>

<div class="header">
<div class="logo">👑</div>
<h1>Complete Purchase</h1>
<p>Premium Preset Access</p>
</div>

<div class="product-card">

<img
src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=500"
class="thumb">

<div class="product-info">

<span class="vip">VIP</span>

<h2>Cinematic Preset</h2>

<p>Premium Color Grading Pack</p>

</div>

<div class="price">
₹49
</div>

</div>

<div class="section-title">
Scan QR Code
</div>

<div class="qr-card">

<img
src="Screenshot_20260623-162531.png"
class="qr">

</div>

<div class="upi-card">

<div class="upi-label">
UPI ID
</div>

<div class="upi-box">

<div class="upi-id">
6294778013-2@ybl
</div>

<button
class="copy-btn"
onclick="copyUPI()">
Copy
</button>

</div>

</div>

<input
type="text"
class="txn-input"
placeholder="Enter Transaction ID">

<button class="verify-btn">
Verify Payment
</button>

<a
href="https://wa.me/916294778013"
class="support-btn">
WhatsApp Support
</a>

<div class="footer">
Secure Payment • TIME KAMU
</div>

</div>

<script>

function copyUPI(){

navigator.clipboard.writeText(
"6294778013-2@ybl"
);

alert("UPI ID Copied");

}

</script>

</body>
</html>
