<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings - TIME KAMU</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f6f6f7;
padding:20px;
}

.container{
max-width:430px;
margin:auto;
}

.back-btn{
width:55px;
height:55px;
border:none;
background:white;
border-radius:50%;
font-size:24px;
font-weight:bold;
box-shadow:0 10px 25px rgba(0,0,0,.08);
margin-bottom:15px;
cursor:pointer;
}

.hero{
background:white;
padding:25px;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
margin-bottom:20px;
}

.hero h1{
font-size:34px;
font-weight:800;
}

.hero p{
margin-top:6px;
color:#888;
font-size:15px;
}

.menu{
background:white;
border-radius:28px;
padding:10px 20px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 0;
border-bottom:1px solid #eee;
font-size:16px;
font-weight:600;
}

.item:last-child{
border-bottom:none;
}

.toggle{
width:45px;
height:24px;
background:#ddd;
border-radius:20px;
position:relative;
}

.toggle::after{
content:'';
position:absolute;
width:18px;
height:18px;
background:white;
border-radius:50%;
top:3px;
left:3px;
}

.logout{
width:100%;
height:58px;
border:none;
background:black;
color:white;
border-radius:18px;
font-size:17px;
font-weight:700;
margin-top:20px;
cursor:pointer;
}

.footer{
text-align:center;
margin-top:20px;
font-size:13px;
color:#999;
}

</style>
</head>

<body>

<div class="container">

<button class="back-btn"
onclick="location.href='profile.html'">
←
</button>

<div class="hero">
<h1>Settings</h1>
<p>Manage your TIME KAMU account</p>
</div>

<div class="menu">

<div class="item">
<span>🔔 Notifications</span>
<div class="toggle"></div>
</div>

<div class="item">
<span>🎵 Background Music</span>
<div class="toggle"></div>
</div>

<div class="item">
<span>🌙 Dark Mode</span>
<div class="toggle"></div>
</div>

<div class="item">
<span>📦 Download History</span>
<span>›</span>
</div>

<div class="item">
<span>💬 Support Center</span>
<span>›</span>
</div>

<div class="item">
<span>📱 Version</span>
<span>v1.0</span>
</div>

</div>

<button class="logout"
onclick="location.href='login.html'">
Logout
</button>

<div class="footer">
TIME KAMU Settings
</div>

</div>

</body>
</html>
