<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Success - TIME KAMU</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f6f6f7;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:white;
border-radius:40px;
padding:40px 25px;
box-shadow:0 10px 40px rgba(0,0,0,.08);
text-align:center;
}

.success-circle{
width:110px;
height:110px;
background:#18c964;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
animation:pop .5s ease;
}

.success-circle span{
font-size:55px;
color:white;
font-weight:bold;
}

@keyframes pop{
0%{
transform:scale(0);
}
100%{
transform:scale(1);
}
}

h1{
font-size:42px;
font-weight:800;
margin-top:25px;
color:#111;
}

.subtitle{
color:#888;
font-size:18px;
margin-top:8px;
}

.card{
background:#fafafa;
border-radius:25px;
padding:22px;
margin-top:30px;
text-align:left;
}

.row{
display:flex;
justify-content:space-between;
margin:14px 0;
font-size:17px;
}

.label{
color:#888;
}

.value{
font-weight:700;
color:#111;
}

.download-btn{
width:100%;
height:65px;
border:none;
border-radius:22px;
background:#111;
color:white;
font-size:22px;
font-weight:700;
margin-top:30px;
cursor:pointer;
}

.home-btn{
width:100%;
height:60px;
border:none;
border-radius:22px;
background:white;
border:2px solid #e5e5e5;
font-size:18px;
font-weight:600;
margin-top:15px;
cursor:pointer;
}

.footer{
margin-top:25px;
color:#999;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="success-circle">
<span>✓</span>
</div>

<h1>Success</h1>

<p class="subtitle">
Payment Verified Successfully
</p>

<div class="card">

<div class="row">
<span class="label">Preset</span>
<span class="value">Cinematic Preset</span>
</div>

<div class="row">
<span class="label">Amount</span>
<span class="value">₹49</span>
</div>

<div class="row">
<span class="label">Order ID</span>
<span class="value">#TK2026</span>
</div>

<div class="row">
<span class="label">Status</span>
<span class="value" style="color:#18c964;">Verified</span>
</div>

</div>

<button class="download-btn"
onclick="window.location.href='https://your-download-link.com'">
Download Preset
</button>

<button class="home-btn"
onclick="window.location.href='home.html'">
Back To Home
</button>

<div class="footer">
TIME KAMU Premium Access
</div>

</div>

</body>
</html>
