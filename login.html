<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIME KAMU Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f4f6;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:400px;
background:#fff;
border-radius:35px;
padding:35px 25px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.logo{
font-size:55px;
text-align:center;
margin-bottom:10px;
}

.title{
text-align:center;
font-size:34px;
font-weight:bold;
margin-bottom:10px;
}

.sub{
text-align:center;
color:#777;
margin-bottom:30px;
}

.input{
width:100%;
padding:16px;
margin-bottom:15px;
border:2px solid #eee;
border-radius:15px;
font-size:16px;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:#111;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.back{
display:block;
text-align:center;
margin-top:20px;
text-decoration:none;
color:#555;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">👑</div>

<div class="title">TIME KAMU</div>

<div class="sub">
Login To Your Account
</div>

<input type="email" id="email" class="input" placeholder="Email">

<input type="password" id="password" class="input" placeholder="Password">

<button class="btn" onclick="login()">
LOGIN
</button>

<a href="index.html" class="back">
← Back To Home
</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDbrMx6RdN_VnSxt1VspKn8yA5HvNeHMQE",
  authDomain: "kamupreset1.firebaseapp.com",
  projectId: "kamupreset1",
  storageBucket: "kamupreset1.firebasestorage.app",
  messagingSenderId: "79907609973",
  appId: "1:79907609973:web:a65ab09ce59b99d37f873c",
  measurementId: "G-34SBTMX2FX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("Login Successful");

window.location.href="home.html";

}catch(error){

alert(error.message);

}

}

</script>

</body>
</html>
