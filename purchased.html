<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purchased Presets - TIME KAMU</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f6f6f7;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.header{
background:white;
padding:25px;
border-radius:30px;
box-shadow:0 8px 25px rgba(0,0,0,.05);
margin-bottom:20px;
}

.header h1{
font-size:34px;
font-weight:800;
}

.header p{
color:#888;
margin-top:5px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
background:white;
border-radius:25px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,.04);
}

.card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
}

.info{
padding:12px;
}

.info h3{
font-size:15px;
margin-bottom:8px;
}

.download{
width:100%;
height:42px;
border:none;
background:#111;
color:white;
border-radius:12px;
font-weight:600;
cursor:pointer;
}

.back{
width:100%;
height:58px;
margin-top:25px;
border:none;
background:white;
border:2px solid #e5e5e5;
border-radius:18px;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.footer{
text-align:center;
margin-top:20px;
font-size:13px;
color:#999;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Purchased</h1>
<p>Your Premium Presets</p>
</div>

<div class="grid">

<div class="card">
<img src="https://picsum.photos/500?11">
<div class="info">
<h3>Cinematic Preset</h3>
<button class="download">
Download
</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/500?12">
<div class="info">
<h3>Dark Tone Preset</h3>
<button class="download">
Download
</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/500?13">
<div class="info">
<h3>Photo Master</h3>
<button class="download">
Download
</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/500?14">
<div class="info">
<h3>Reel Editing Pack</h3>
<button class="download">
Download
</button>
</div>
</div>

</div>

<button class="back"
onclick="window.location.href='profile.html'">
Back To Profile
</button>

<div class="footer">
TIME KAMU Premium Library
</div>

</div>

</body>
</html>
