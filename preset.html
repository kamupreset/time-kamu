<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIME KAMU Preset</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f7f7f7;
padding:20px;
color:#111;
}

.topbar{
display:flex;
align-items:center;
gap:10px;
margin-bottom:25px;
}

.back{
font-size:22px;
text-decoration:none;
color:#111;
}

.card{
background:#fff;
border-radius:35px;
padding:25px;
box-shadow:0 5px 25px rgba(0,0,0,.05);
}

.title-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.title{
font-size:32px;
font-weight:700;
}

.vip{
background:#111;
color:#fff;
padding:8px 16px;
border-radius:50px;
font-size:14px;
}

.price{
font-size:28px;
font-weight:700;
margin-bottom:15px;
}

.desc{
color:#777;
line-height:1.7;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:25px;
}

.grid img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:22px;
}

.rating{
text-align:center;
font-size:18px;
font-weight:600;
margin-bottom:25px;
}

.buy{
width:100%;
height:60px;
border:none;
border-radius:18px;
background:#111;
color:white;
font-size:20px;
font-weight:700;
cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
<a href="home.html" class="back">←</a>
</div>

<div class="card">

<div class="title-row">
<h1 class="title" id="title">Loading...</h1>
<span class="vip" id="category">VIP</span>
</div>

<div class="price" id="price">₹0</div>

<p class="desc" id="desc">
Loading...
</p>

<div class="grid">
<img id="thumb1" src="">
<img id="thumb2" src="">
<img id="thumb3" src="">
<img id="thumb4" src="">
</div>

<div class="rating">
⭐⭐⭐⭐⭐ 4.9 Rating
</div>

<button class="buy" id="buyBtn">
Buy Now
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDbrMx6RdN_VnSxt1VspKn8yA5HvNeHMQE",
authDomain: "kamupreset1.firebaseapp.com",
projectId: "kamupreset1",
storageBucket: "kamupreset1.firebasestorage.app",
messagingSenderId: "79907609973",
appId: "1:79907609973:web:a65ab09ce59b99d37f873c",
measurementId: "G-34SBTMX2FX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(id){

const snap = await getDoc(doc(db,"presets",id));

if(snap.exists()){

const data = snap.data();

document.getElementById("title").innerText =
data.title || "";

document.getElementById("category").innerText =
data.category || "VIP";

document.getElementById("price").innerText =
"₹" + (data.price || 0);

document.getElementById("desc").innerText =
data.description || "";

document.getElementById("thumb1").src =
data.thumbnail || "";

document.getElementById("thumb2").src =
data.thumbnail || "";

document.getElementById("thumb3").src =
data.thumbnail || "";

document.getElementById("thumb4").src =
data.thumbnail || "";

document.title =
data.title + " - TIME KAMU";

}

}

document.getElementById("buyBtn").onclick = () => {

window.location.href =
"payment.html?id=" + id;

};

</script>

</body>
</html>
